<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brew & Bake - Staff Orders</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    body { font-family: var(--font-sans); }
    .status-main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 56px; }
    .status-header { display: flex; justify-content: space-between; gap: 16px; align-items: end; margin-bottom: 24px; }
    .status-header h1 { font-family: var(--font-serif); font-size: 2rem; color: var(--brown-dark); }
    .status-header p, .refresh-meta { color: var(--text-muted); font-size: 0.9rem; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .staff-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px; box-shadow: 0 4px 18px rgba(59, 31, 14, 0.08); }
    .staff-card h2 { font-size: 1rem; color: var(--brown-dark); margin-bottom: 6px; word-break: break-word; }
    .staff-card dl { display: grid; grid-template-columns: auto 1fr; gap: 8px 12px; margin: 14px 0; font-size: 0.9rem; }
    .staff-card dt { color: var(--text-muted); }
    .staff-card dd { color: var(--text-main); font-weight: 600; }
    .status-pill { display: inline-flex; padding: 4px 10px; border-radius: 999px; background: var(--tag-bg); color: var(--brown-mid); text-transform: capitalize; font-size: 0.8rem; font-weight: 700; }
    .staff-card button { width: 100%; border: 0; border-radius: var(--radius-sm); background: var(--brown-dark); color: var(--gold-light); padding: 10px 12px; font-weight: 700; cursor: pointer; }
    .staff-card button:disabled { opacity: 0.55; cursor: not-allowed; }
    .empty-state { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-md); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">
      S O F A
      <span class="nav-tagline">Coffee &amp; Bakery</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Menu</a></li>
      <li><a href="track.html" class="nav-link">Track order</a></li>
      <li><a href="status.html" class="nav-link active">Staff</a></li>
    </ul>
    <div class="nav-right">
      <div id="nav-auth-slot"></div>
      <a href="cart.html" class="nav-btn primary">Cart <span class="cart-badge" id="cart-badge">0</span></a>
    </div>
  </nav>

  <main class="status-main">
    <header class="status-header">
      <div>
        <h1>Active Orders</h1>
        <p>Move orders forward through the kitchen workflow.</p>
      </div>
      <p class="refresh-meta" id="refresh-meta">Loading...</p>
    </header>

    <section class="orders-grid" id="status-orders" aria-live="polite"></section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/status.js"></script>
</body>
</html>
