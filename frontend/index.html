<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Brewed Awakenings</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F8F5F2;
            margin: 0;
            padding: 0;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Premium Navbar Styling */
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 2rem;
            box-shadow: 0 4px 12px rgba(108, 74, 58, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: #6C4A3A;
            text-decoration: none;
        }

        .navbar-logo svg {
            width: 24px;
            height: 24px;
        }

        /* Auth Links Container */
        .nav-auth-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-auth-links a {
            color: #6C4A3A;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .nav-auth-links a:hover {
            color: #54392b;
        }

        /* Responsive Navbar */
        @media (max-width: 600px) {
            .navbar {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }
            .nav-auth-links {
                width: 100%;
                justify-content: center;
            }
        }

        .menu-content {
            padding: 4rem 2rem;
            text-align: center;
            flex: 1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
                <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path>
                <line x1="6" y1="2" x2="6" y2="4"></line>
                <line x1="10" y1="2" x2="10" y2="4"></line>
                <line x1="14" y1="2" x2="14" y2="4"></line>
            </svg>
            Brewed Awakenings
        </a>
        <div id="navAuthLinks" class="nav-auth-links">
            <!-- Dynamically populated by updateNavbar() in auth.js -->
        </div>
    </nav>

    <div class="menu-content">
        <h1>Welcome to the Menu</h1>
        <p>Our coffee selection will be loaded here.</p>
        <button class="btn-primary" style="margin-top: 2rem; max-width: 200px; margin-left: auto; margin-right: auto;" onclick="window.location.href='track.html?order=102'">
            Track My Order
        </button>
    </div>

    <!-- Load auth logic to handle state & Logout buttons -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.updateNavbar === 'function') {
                window.updateNavbar();
            }
        });
    </script>
</body>
</html>
