<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Brewed Awakenings</title>
    <link rel="stylesheet" href="css/auth.css">
    <script>
        const _token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        if (_token) {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>

<div class="auth-container">
    <div class="auth-left">
        <div class="auth-left-content">
            <h2>Create Your Account</h2>
            <p>Join us and start your journey<br>with the perfect cup.</p>
        </div>
    </div>
    
    <div class="auth-right">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
                <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path>
                <line x1="6" y1="2" x2="6" y2="4"></line>
                <line x1="10" y1="2" x2="10" y2="4"></line>
                <line x1="14" y1="2" x2="14" y2="4"></line>
            </svg>
            Brewed Awakenings
        </div>
        
        <div class="auth-header">
            <h1>Sign Up</h1>
            <p>Create an account to get started.</p>
        </div>

        <div id="globalError" class="global-error" role="alert"></div>
        <div id="globalSuccess" class="global-success" role="alert"></div>

        <form id="registerForm" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" maxlength="30">
                </div>
                <div class="error-text" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email" maxlength="255">
                </div>
                <div class="error-text" id="emailError"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="new-password" maxlength="128">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm your password" required autocomplete="new-password" maxlength="128">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div class="error-text" id="confirmPasswordError"></div>
                </div>
            </div>



            <button type="submit" id="submitBtn" class="btn-primary">
                <span class="btn-text">Create Account</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="auth-footer" style="margin-top: 1.5rem;">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
